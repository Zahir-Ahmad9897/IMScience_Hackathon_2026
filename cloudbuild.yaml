steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/kisanai:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/kisanai:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/kisanai:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/kisanai:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'kisanai'
      - '--image=gcr.io/$PROJECT_ID/kisanai:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300'
      - '--port=8080'
      - '--set-env-vars=OPENAI_API_KEY=$$OPENAI_API_KEY,GROQ_API_KEY=$$GROQ_API_KEY,OPENWEATHER_API_KEY=$$OPENWEATHER_API_KEY,LANGCHAIN_API_KEY=$$LANGCHAIN_API_KEY,LANGCHAIN_TRACING_V2=true,LANGCHAIN_PROJECT=KisanAI-MultiAgent,ALERT_EMAIL_SENDER=$$ALERT_EMAIL_SENDER,ALERT_EMAIL_PASSWORD=$$ALERT_EMAIL_PASSWORD,ALERT_EMAIL_RECEIVER=$$ALERT_EMAIL_RECEIVER'

images:
  - 'gcr.io/$PROJECT_ID/kisanai:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/kisanai:latest'

options:
  logging: CLOUD_LOGGING_ONLY
